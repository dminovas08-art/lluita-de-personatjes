<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Battle Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>RPG Battle Arena</h1>
    </header>

    <main id="game-container">
        <section class="player-zone" id="player1">
            <h2>Jugador 1</h2>
            <div class="team-container" id="team1">
                <div class="character-card">
                    <div class="char-info">
                        <span class="char-name">Elfo</span>
                        <span class="char-hp">Vida: 100</span>
                    </div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 100%;"></div></div>
                    <div class="stats">
                        <span>⚔️ 5</span>
                        <span>🛡️ 3</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="vs-divider">VS</div>

        <section class="player-zone" id="player2">
            <h2>Jugador 2</h2>
            <div class="team-container" id="team2">
                <div class="character-card">
                    <div class="char-
                    info">
                        <span class="char-name">Orco</span>
                        <span class="char-hp">Vida: 120</span>
                    </div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 100%;"></div></div>
                    <div class="stats">
                        <span>⚔️ 10</span>
                        <span>🛡️ 2</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="combat-log">
        <h3>Registre de Combat</h3>
        <ul id="log-list">
            <li>La batalla ha començat!</li>
        </ul>
    </footer>

</body>
</html>
