<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Battle Arena</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>RPG Battle Arena</h1>
    </header>

    <main id="game-container">
        <section class="player-zone" id="player1">
            <h2>Jugador 1</h2>
            <div class="team-container" id="team1">
                <div class="j1-card">
                    <div class="j1-info">
                        <span id="j1-name"></span>
                        <span id="j1-hp"></span>
                    </div>
                    <div class="stats">
                        <span id="j1-attack"></span>
                        <span id="j1-defense"></span>
                    </div>
                </div>
            </div>
        </section>

        <div class="vs-divider">VS</div>

        <section class="player-zone" id="player2">
            <h2>Jugador 2</h2>
            <div class="team-container" id="team2">
                <div class="j2-card">
                    <div class="j2-info">
                        <span id="j2-name"></span>
                        <span id="j2-hp"></span>
                    </div>
                    <div class="stats">
                        <span id="j2-attack"></span>
                        <span id="j2-defense"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
